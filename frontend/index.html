<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Document Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2><i class="fas fa-layer-group"></i> Workspace</h2>
            </div>

            <div class="sidebar-content">
                <div class="upload-section">
                    <button id="new-chat-btn" class="upload-btn primary-btn">
                        <i class="fas fa-plus"></i> New Chat
                    </button>
                    <br>
                    <label for="pdf-upload" class="upload-btn">
                        <i class="fas fa-file-pdf"></i> Upload PDF
                    </label>
                    <input type="file" id="pdf-upload" accept="application/pdf" hidden>
                    <div id="upload-status" class="status-msg hidden"></div>
                </div>
            </div>
        </aside>

        <main class="chat-container">
            <header class="main-header">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <h2>DeepSeek Document RAG</h2>
            </header>

            <div class="chat-history" id="chat-history">
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Message Assistant..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" disabled>
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
                <div class="disclaimer">
                    AI can make mistakes. Always check the cited page numbers.
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
